kind = "web"
previewPath = "/"
title = "AI Recipe Scanner"
version = "1.0.0"
id = "artifacts/recipe-scanner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19115

[services.development]
run = "pnpm --filter @workspace/recipe-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/recipe-scanner", "run", "build" ]
publicDir = "artifacts/recipe-scanner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19115"
BASE_PATH = "/"
